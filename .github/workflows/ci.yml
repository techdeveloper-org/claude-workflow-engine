# CI Pipeline - Claude Workflow Engine
# Triggers on push to main and pull requests targeting main.
# Runs two parallel jobs: test (matrix: Python 3.8/3.10/3.12) and lint (ruff).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal permissions - read-only access to repository contents.
permissions:
  contents: read

jobs:

  # ─── Job 1: Test ──────────────────────────────────────────────────────────
  # Runs pytest across three Python versions using a matrix strategy.
  # Full test run uses continue-on-error because some tests require external
  # services (Qdrant, Ollama, GitHub API) that are not available in CI.
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # Keep running other versions even if one fails
      matrix:
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip   # Cache pip packages keyed on requirements.txt hash

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Validate test discovery without running tests.
      # Fails fast on import errors or broken test file syntax.
      - name: Collect tests (validate discovery)
        run: pytest tests/ --tb=short -q --collect-only

      # Run the full test suite. continue-on-error=true because many tests
      # require external services (Qdrant, GitHub token, Ollama endpoint)
      # that are not available in CI.
      - name: Run tests
        continue-on-error: true
        run: pytest tests/ -x --tb=short -q

      # Generate a coverage report when pytest-cov is available.
      # Skipped silently if the package is not installed.
      - name: Generate coverage report
        continue-on-error: true
        run: pytest tests/ --tb=short -q --cov=scripts --cov=src --cov-report=term-missing

  # ─── Job 2: Lint ──────────────────────────────────────────────────────────
  # Runs ruff on scripts/ and src/ to catch syntax errors, undefined names,
  # and PEP 8 violations. Line-length (E501) is ignored per project style.
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff

      # E = pycodestyle errors, W = pycodestyle warnings, F = pyflakes.
      # E501 (line too long) is intentionally excluded.
      - name: Run ruff
        run: ruff check scripts/ src/ --select E,W,F --ignore E501
