# CI Pipeline - Claude Workflow Engine
# Triggers on push to main and pull requests targeting main.
# Runs two parallel jobs: test (matrix: Python 3.8/3.10/3.12) and lint (ruff).
#
# CONFIGURABLE: Control via GitHub repo variables (Settings > Variables > Actions):
#   ENABLE_CI       = true/false  (master switch, default: true)
#   ENABLE_TESTS    = true/false  (run test job, default: true)
#   ENABLE_LINT     = true/false  (run lint job, default: true)
#   ENABLE_COVERAGE = true/false  (run coverage report, default: true)
#
# To disable CI entirely: set ENABLE_CI=false in repo variables.
# To skip just tests: set ENABLE_TESTS=false (lint still runs).
# To skip just lint: set ENABLE_LINT=false (tests still run).

name: CI

on:
  # Auto-trigger disabled — run manually via GitHub Actions UI > "Run workflow".
  # To re-enable: uncomment the push/pull_request blocks below.
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run test suite"
        type: boolean
        default: true
      run_lint:
        description: "Run linter"
        type: boolean
        default: true
      run_coverage:
        description: "Generate coverage report"
        type: boolean
        default: true

# Minimal permissions - read-only access to repository contents.
permissions:
  contents: read

jobs:

  # --- Gate: Check if CI is enabled ------------------------------------------
  # Reads ENABLE_CI repo variable. If false, all downstream jobs are skipped.
  check-enabled:
    name: Check CI flags
    runs-on: ubuntu-latest
    outputs:
      ci_enabled: ${{ steps.flags.outputs.ci_enabled }}
      tests_enabled: ${{ steps.flags.outputs.tests_enabled }}
      lint_enabled: ${{ steps.flags.outputs.lint_enabled }}
      coverage_enabled: ${{ steps.flags.outputs.coverage_enabled }}
    steps:
      - id: flags
        run: |
          # Master switch (default: true if not set)
          CI_FLAG="${{ vars.ENABLE_CI }}"
          echo "ci_enabled=${CI_FLAG:-true}" >> "$GITHUB_OUTPUT"

          # Per-job flags (respect workflow_dispatch inputs if provided)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tests_enabled=${{ inputs.run_tests }}" >> "$GITHUB_OUTPUT"
            echo "lint_enabled=${{ inputs.run_lint }}" >> "$GITHUB_OUTPUT"
            echo "coverage_enabled=${{ inputs.run_coverage }}" >> "$GITHUB_OUTPUT"
          else
            TESTS_FLAG="${{ vars.ENABLE_TESTS }}"
            LINT_FLAG="${{ vars.ENABLE_LINT }}"
            COV_FLAG="${{ vars.ENABLE_COVERAGE }}"
            echo "tests_enabled=${TESTS_FLAG:-true}" >> "$GITHUB_OUTPUT"
            echo "lint_enabled=${LINT_FLAG:-true}" >> "$GITHUB_OUTPUT"
            echo "coverage_enabled=${COV_FLAG:-true}" >> "$GITHUB_OUTPUT"
          fi

  # --- Job 1: Test -----------------------------------------------------------
  # Runs pytest across two Python versions using a matrix strategy.
  # Full test run uses continue-on-error because some tests require external
  # services (GitHub API, Anthropic API) that are not available in CI.
  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: check-enabled
    if: needs.check-enabled.outputs.ci_enabled == 'true' && needs.check-enabled.outputs.tests_enabled == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # Keep running other versions even if one fails
      matrix:
        # langgraph>=0.2.0 requires Python 3.9+; 3.8 is not supported.
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install -r requirements.txt --system

      # Validate test discovery without running tests.
      # Fails fast on import errors or broken test file syntax.
      - name: Collect tests (validate discovery)
        run: pytest tests/ --tb=short -q --collect-only

      # Run the full test suite. continue-on-error=true because many tests
      # require external services (GitHub token, Anthropic API)
      # that are not available in CI.
      - name: Run tests
        continue-on-error: true
        run: pytest tests/ -x --tb=short -q

      # Generate coverage report and enforce 50% minimum threshold.
      # Threshold is configured in .coveragerc (fail_under = 50).
      # Controlled by ENABLE_COVERAGE flag (default: true).
      - name: Coverage report + threshold enforcement
        if: needs.check-enabled.outputs.coverage_enabled == 'true'
        run: pytest tests/ --tb=short -q --cov=langgraph_engine --cov=scripts --cov=src --cov-report=term-missing --cov-fail-under=50

  # --- Job 2: Lint -----------------------------------------------------------
  # Runs ruff on scripts/ and src/ to catch syntax errors, undefined names,
  # and PEP 8 violations. Line-length (E501) is ignored per project style.
  lint:
    name: Lint (ruff)
    needs: check-enabled
    if: needs.check-enabled.outputs.ci_enabled == 'true' && needs.check-enabled.outputs.lint_enabled == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ruff
        run: pip install ruff

      # E = pycodestyle errors, W = pycodestyle warnings, F = pyflakes.
      # E501 (line too long) is intentionally excluded.
      - name: Run ruff
        run: ruff check langgraph_engine/ scripts/ src/ --select E,W,F --ignore E501
