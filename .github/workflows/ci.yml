# CI Pipeline - Claude Workflow Engine
# Triggers on push to main, pull_request targeting main, and manual workflow_dispatch.
# Step ordering DAG:
#   check-enabled -> [secrets_check || lint] -> install -> unit_tests
#                    -> integration_tests -> coverage -> upload-artifact
#
# CONFIGURABLE: Control via GitHub repo variables (Settings > Variables > Actions):
#   ENABLE_CI       = true/false  (master switch, default: true)
#   ENABLE_TESTS    = true/false  (run test job, default: true)
#   ENABLE_LINT     = true/false  (run lint job, default: true)
#   ENABLE_COVERAGE = true/false  (run coverage report, default: true)
#
# To disable CI entirely: set ENABLE_CI=false in repo variables.
# To skip just tests: set ENABLE_TESTS=false (lint still runs).
# To skip just lint: set ENABLE_LINT=false (tests still run).

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "uml/**"
      - "drawio/**"
      - "**/*.md"
      - "LICENSE"
      - "VERSION"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "uml/**"
      - "drawio/**"
      - "**/*.md"
      - "LICENSE"
      - "VERSION"
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run test suite"
        type: boolean
        default: true
      run_lint:
        description: "Run linter"
        type: boolean
        default: true
      run_coverage:
        description: "Generate coverage report"
        type: boolean
        default: true

# Cancel superseded runs for the same ref to avoid wasted compute.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions - read-only access to repository contents.
permissions:
  contents: read

jobs:

  # --- Gate: Check if CI is enabled ------------------------------------------
  # Reads ENABLE_CI repo variable. If false, all downstream jobs are skipped.
  check-enabled:
    name: Check CI flags
    runs-on: ubuntu-latest
    outputs:
      ci_enabled: ${{ steps.flags.outputs.ci_enabled }}
      tests_enabled: ${{ steps.flags.outputs.tests_enabled }}
      lint_enabled: ${{ steps.flags.outputs.lint_enabled }}
      coverage_enabled: ${{ steps.flags.outputs.coverage_enabled }}
    steps:
      - id: flags
        run: |
          # Master switch (default: true if not set)
          CI_FLAG="${{ vars.ENABLE_CI }}"
          echo "ci_enabled=${CI_FLAG:-true}" >> "$GITHUB_OUTPUT"

          # Per-job flags (respect workflow_dispatch inputs if provided)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tests_enabled=${{ inputs.run_tests }}" >> "$GITHUB_OUTPUT"
            echo "lint_enabled=${{ inputs.run_lint }}" >> "$GITHUB_OUTPUT"
            echo "coverage_enabled=${{ inputs.run_coverage }}" >> "$GITHUB_OUTPUT"
          else
            TESTS_FLAG="${{ vars.ENABLE_TESTS }}"
            LINT_FLAG="${{ vars.ENABLE_LINT }}"
            COV_FLAG="${{ vars.ENABLE_COVERAGE }}"
            echo "tests_enabled=${TESTS_FLAG:-true}" >> "$GITHUB_OUTPUT"
            echo "lint_enabled=${LINT_FLAG:-true}" >> "$GITHUB_OUTPUT"
            echo "coverage_enabled=${COV_FLAG:-true}" >> "$GITHUB_OUTPUT"
          fi

  # --- Job 1: Test -----------------------------------------------------------
  # Runs pytest across two Python versions using a matrix strategy.
  # Stages: secrets_check (hard gate) -> install -> unit_tests
  #         -> integration_tests -> coverage -> upload-artifact
  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: check-enabled
    if: needs.check-enabled.outputs.ci_enabled == 'true' && needs.check-enabled.outputs.tests_enabled == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # Keep running other versions even if one fails
      matrix:
        # ADR-003: Python 3.9 and 3.11 matrix (langgraph>=0.2.0 requires Python 3.9+)
        python-version: ["3.9", "3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      # --- Secrets scan (hard gate — NO continue-on-error) -------------------
      # Blocks the entire job if secrets are found. Must pass before any test runs.
      - name: Secrets scan (gate)
        run: python scripts/secrets_check.py

      - name: Install production dependencies
        run: uv pip install -r requirements.txt --system

      - name: Install dev dependencies
        run: uv pip install -r requirements-dev.txt --system

      # Validate test discovery without running tests.
      # Fails fast on import errors or broken test file syntax.
      - name: Collect tests (validate discovery)
        run: pytest tests/ --tb=short -q --collect-only

      # --- Unit tests (exclude integration-marked tests) ---------------------
      - name: Run unit tests
        run: pytest tests/ -m "not integration" --tb=short -q

      # --- Integration tests -------------------------------------------------
      # Hard gate: CI fails if integration tests fail. Tests use offline mocks
      # (responses library) and do not require live GitHub credentials.
      - name: Run integration tests
        env:
          GITHUB_TOKEN: fake-token-for-testing
          ANTHROPIC_API_KEY: fake-key-for-testing
        run: pytest tests/integration/ -m integration --tb=short -q

      # --- Coverage report ---------------------------------------------------
      # Enforces 50% minimum threshold configured in .coveragerc (fail_under=50).
      # Generates coverage.xml for artifact upload.
      - name: Coverage report + threshold enforcement
        if: needs.check-enabled.outputs.coverage_enabled == 'true'
        run: |
          pytest tests/ -m "not integration" --tb=short -q \
            --cov=langgraph_engine --cov=scripts --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=50

      # --- Upload coverage artifact ------------------------------------------
      - name: Upload coverage report
        if: needs.check-enabled.outputs.coverage_enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}-${{ github.sha }}
          path: coverage.xml
          retention-days: 30

  # --- Job 2: Lint -----------------------------------------------------------
  # Runs ruff on scripts/ and src/ to catch syntax errors, undefined names,
  # and PEP 8 violations. Line-length (E501) is ignored per project style.
  lint:
    name: Lint (ruff)
    needs: check-enabled
    if: needs.check-enabled.outputs.ci_enabled == 'true' && needs.check-enabled.outputs.lint_enabled == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      # E = pycodestyle errors, W = pycodestyle warnings, F = pyflakes.
      # E501 (line too long) is intentionally excluded.
      - name: Run ruff
        run: ruff check langgraph_engine/ scripts/ src/ --select E,W,F --ignore E501
