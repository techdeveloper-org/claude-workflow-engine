[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short -q
markers =
    unit: Unit tests — no external services required
    integration: Integration tests — require GitHub, Anthropic API, etc.
    mcp: MCP server tests
    slow: Tests taking more than 5 seconds
    e2e: End-to-end scenario tests — mocked LangGraph execution
    load: Load and concurrency tests — set RUN_LOAD_TESTS=1 to enable
